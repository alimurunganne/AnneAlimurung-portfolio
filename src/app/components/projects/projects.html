<div class="page-wrapper">

  <app-navbar activePage="/projects"></app-navbar>

  <!-- ── Blobs ── -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="projects-main">
    <div class="container">

      <!-- ── Page Heading ── -->
      <div class="text-center mb-5 fade-up delay-1">
        <p class="hero-eyebrow">What I've Built</p>
        <h1 class="page-title">My Projects</h1>
        <div class="title-divider"></div>
        <p class="page-subtitle">
          A collection of work showcasing my skills in web development,<br class="d-none d-md-inline">
          digital tools, and creative exploration.
        </p>
      </div>

      <!-- ── Section Separator ── -->
      <div class="section-sep fade-up">
        <span>Featured Work</span>
      </div>

      <!-- ── Project Cards ── -->
      <div class="projects-list fade-up delay-2">
        <div *ngFor="let project of projects; let i = index" class="project-card">

          <!-- Image on top -->
          <div class="project-image-wrapper">
            <img [src]="project.image" [alt]="project.title">
          </div>

          <!-- Title — always visible -->
          <div class="project-title-row">
            <span class="project-number">0{{ i + 1 }}</span>
            <h2 class="project-title">{{ project.title }}</h2>
          </div>

          <!-- Description + tags + link — slides down on hover -->
          <div class="project-info">
            <p class="project-description">{{ project.description }}</p>
            <div class="project-tags">
              <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
            </div>
            <a [href]="project.link" class="project-link" target="_blank">View Project ↗</a>
          </div>

        </div>
      </div>

    </div><!-- /container -->
  </main>

  <app-footer></app-footer>

</div>
